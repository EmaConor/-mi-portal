<!-- PÁGINA DE GALERÍA - COMPONENTE -->
<div class="container my-5 pt-4">
  <h1 class="section-title text-center mb-4">Galería de eventos</h1>
  <p class="text-center mb-5">
    Revive los mejores momentos de nuestros talleres, conferencias y encuentros
    de emprendedores.
  </p>

  <!-- 6 IMÁGENES con FIGURE y FIGCAPTION -->
  <div class="row g-4">
    <div class="col-md-6 col-lg-4">
      <figure class="galeria-item">
        <img
          src="img/1.png"
          alt="Conferencia magistral de emprendimiento"
          class="img-fluid rounded shadow"
        />
        <figcaption class="mt-2 text-center fw-bold">
          Conferencia anual 2024
        </figcaption>
      </figure>
    </div>
    <div class="col-md-6 col-lg-4">
      <figure class="galeria-item">
        <img
          src="img/2.jpg"
          alt="Taller de design thinking"
          class="img-fluid rounded shadow"
        />
        <figcaption class="mt-2 text-center fw-bold">
          Taller de Design Thinking
        </figcaption>
      </figure>
    </div>
    <div class="col-md-6 col-lg-4">
      <figure class="galeria-item">
        <img
          src="img/3.webp"
          alt="Networking entre emprendedores"
          class="img-fluid rounded shadow"
        />
        <figcaption class="mt-2 text-center fw-bold">
          Sesión de networking
        </figcaption>
      </figure>
    </div>
    <div class="col-md-6 col-lg-4">
      <figure class="galeria-item">
        <img
          src="img/4.jpg"
          alt="Equipo de mentores asesorando"
          class="img-fluid rounded shadow"
        />
        <figcaption class="mt-2 text-center fw-bold">
          Mentorías personalizadas
        </figcaption>
      </figure>
    </div>
    <div class="col-md-6 col-lg-4">
      <figure class="galeria-item">
        <img
          src="img/5.png"
          alt="Presentación de startups"
          class="img-fluid rounded shadow"
        />
        <figcaption class="mt-2 text-center fw-bold">Demo Day 2024</figcaption>
      </figure>
    </div>
    <div class="col-md-6 col-lg-4">
      <figure class="galeria-item">
        <img
          src="img/6.jpg"
          alt="Premiación a mejores startups"
          class="img-fluid rounded shadow"
        />
        <figcaption class="mt-2 text-center fw-bold">
          Premiación anual
        </figcaption>
      </figure>
    </div>
  </div>

  <!-- VIDEO INCRUSTADO -->
  <section class="row mt-5 pt-4">
    <div class="col-12">
      <h2 class="section-title text-center mb-4">
        <i class="fas fa-video me-2"></i>Video: ¿Cómo empezar tu startup?
      </h2>
      <div class="ratio ratio-16x9 shadow rounded overflow-hidden">
        <iframe
          src="https://www.youtube.com/watch?v=iULbjqsvWcg"
          title="Cómo empezar una startup"
          frameborder="0"
          allow="
            accelerometer;
            autoplay;
            clipboard-write;
            encrypted-media;
            gyroscope;
            picture-in-picture;
          "
          allowfullscreen
        >
        </iframe>
      </div>
    </div>
  </section>
</div>
